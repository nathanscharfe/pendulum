<svg xmlns="http://www.w3.org/2000/svg" width="900" height="650" viewBox="0 0 900 650">

<defs>
  <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
    <path d="M2,2 L10,6 L2,10 Z" fill="context-stroke"/>
  </marker>
  <style>
    .dash { stroke-dasharray: 8 7; }
    .small { font-size: 19px; }
    .eq { font-size: 22px; font-family: 'Times New Roman', serif; }
  </style>
</defs>

<rect x="0" y="0" width="900" height="650" fill="#fbfbf8"/>
<text x="42.0" y="56.0" font-family="Arial, sans-serif" font-size="28" fill="#111" font-weight="700">Pendulum torque balance in the accelerating cart frame</text>
<text x="42.0" y="91.0" font-family="Arial, sans-serif" font-size="20" fill="#444">Positive x acceleration is to the right; theta is measured from upright.</text>
<line x1="90.0" y1="460.0" x2="800.0" y2="460.0" stroke="#777" stroke-width="2" fill="none"/>
<line x1="705.0" y1="460.0" x2="790.0" y2="460.0" stroke="#444" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
<text x="798.0" y="468.0" font-family="Arial, sans-serif" font-size="22" fill="#444">+x</text>
<line x1="275.0" y1="502.0" x2="405.0" y2="502.0" stroke="#444" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
<text x="278.0" y="536.0" font-family="Arial, sans-serif" font-size="18" fill="#444">cart acceleration x_ddot</text>
<line x1="360.0" y1="460.0" x2="360.0" y2="170.0" stroke="#999" stroke-width="2" fill="none" class="dash"/>
<line x1="360.0" y1="460.0" x2="482.1" y2="230.4" stroke="#222" stroke-width="6" fill="none"/>
<circle cx="360.0" cy="460.0" r="10" fill="#222" stroke="#222" stroke-width="3"/>
<circle cx="482.1" cy="230.4" r="24" fill="#fff9d8" stroke="#222" stroke-width="3"/>
<text x="516.1" y="238.4" font-family="Arial, sans-serif" font-size="19" fill="#333">bob / COM</text>
<path d="M 360.0 388.0 A 72 72 0 0 1 393.8 396.4" stroke="#2b6cb0" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
<text x="393.0" y="378.0" font-family="Arial, sans-serif" font-size="21" fill="#2b6cb0">theta</text>
<line x1="482.1" y1="230.4" x2="482.1" y2="350.4" stroke="#c53030" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
<text x="496.1" y="310.4" font-family="Arial, sans-serif" font-size="22" fill="#c53030">mg</text>
<line x1="482.1" y1="230.4" x2="332.1" y2="230.4" stroke="#2f855a" stroke-width="5" fill="none" marker-end="url(#arrow)"/>
<text x="294.1" y="214.4" font-family="Arial, sans-serif" font-size="21" fill="#2f855a">F_i = -m x_ddot</text>
<line x1="360.0" y1="230.4" x2="482.1" y2="230.4" stroke="#2f855a" stroke-width="3" fill="none" class="dash"/>
<line x1="360.0" y1="230.4" x2="360.0" y2="460.0" stroke="#2f855a" stroke-width="3" fill="none" class="dash"/>
<text x="272.0" y="345.2" font-family="Arial, sans-serif" font-size="19" fill="#2f855a">l cos(theta)</text>
<line x1="360.0" y1="460.0" x2="482.1" y2="460.0" stroke="#c53030" stroke-width="3" fill="none" class="dash"/>
<line x1="482.1" y1="230.4" x2="482.1" y2="460.0" stroke="#c53030" stroke-width="3" fill="none" class="dash"/>
<text x="376.0" y="492.0" font-family="Arial, sans-serif" font-size="19" fill="#c53030">l sin(theta)</text>
<rect x="555" y="170" width="300" height="260" fill="#ffffff" stroke="#ddd" stroke-width="2" rx="8"/>
<text x="579.0" y="212.0" font-family="Arial, sans-serif" font-size="24" fill="#111" font-weight="700">Torque terms</text>
<text x="579.0" y="256.0" font-family="Arial, sans-serif" font-size="19" fill="#555">gravity:</text>
<text x="667.0" y="256.0" font-family="Arial, sans-serif" font-size="21" fill="#c53030" class="eq">tau_g = m g l sin(theta)</text>
<text x="579.0" y="302.0" font-family="Arial, sans-serif" font-size="19" fill="#555">cart frame:</text>
<text x="667.0" y="302.0" font-family="Arial, sans-serif" font-size="21" fill="#2f855a" class="eq">tau_x = -m l x_ddot cos(theta)</text>
<text x="579.0" y="358.0" font-family="Arial, sans-serif" font-size="19" fill="#555">balance:</text>
<text x="667.0" y="358.0" font-family="Arial, sans-serif" font-size="21" fill="#111" class="eq">I theta_ddot = tau_g + tau_x</text>
<text x="579.0" y="402.0" font-family="Arial, sans-serif" font-size="19" fill="#555">point mass:</text>
<text x="687.0" y="402.0" font-family="Arial, sans-serif" font-size="21" fill="#111" class="eq">I = m l^2</text>
</svg>